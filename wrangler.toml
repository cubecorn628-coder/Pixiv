name = "pixiv-scraper"
main = "src/index.js"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# Worker runs on Cloudflare's global network
workers_dev = true

# Optional: custom routes (uncomment + edit)
# routes = [
#   { pattern = "pixiv.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

[vars]
# Non-secret config
APP_VERSION = "1.0.0"

# !! DO NOT put REFRESH_TOKEN here !!
# Set it as an encrypted secret:
#   wrangler secret put REFRESH_TOKEN
# Then paste your token when prompted.
